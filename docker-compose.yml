services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tourguide
      POSTGRES_PASSWORD: tourguide
      POSTGRES_DB: tourguide
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourguide -d tourguide"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8002:8000"
    env_file:
      - ./mcp-server/.env
    environment:
      CORS_ORIGINS: "http://localhost:3000,http://ai-agent:8000"
    volumes:
      - ./mcp-server:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8001:8000"
    env_file:
      - ./ai-agent/.env
    environment:
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      CORS_ORIGINS: "http://localhost:3000,http://backend:8000"
      MCP_SERVER_URL: "http://mcp-server:8000"
    volumes:
      - ./ai-agent:/app
    depends_on:
      mcp-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      PORT: "8000"
      CORS_ORIGINS: "http://localhost:3000"
      DATABASE_URL: "postgresql://tourguide:tourguide@postgres:5432/tourguide"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: infra/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  backend_dist:
